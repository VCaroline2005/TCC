    <path d="M596 206c-26-15-43-34-43-55 0-14 11-25 25-25 10 0 18 5 22 12 4-7 12-12 22-12 14 0 25 11 25 25 0 21-17 40-43 55z" fill="#E31B1B"/>
    <path d="M577 165h14l4-10 6 22 4-12h16" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
