  <path d="M265 210c0 58 50 84 96 84h26c60 0 108 40 108 102v30" stroke="#1F2937" stroke-width="12" stroke-linecap="round"/>
  <path d="M265 210v-42" stroke="#1F2937" stroke-width="12" stroke-linecap="round"/>
  <path d="M313 210v-42" stroke="#1F2937" stroke-width="12" stroke-linecap="round"/>
  <circle cx="499" cy="435" r="24" fill="#FFFFFF"/>
  <circle cx="499" cy="435" r="14" fill="#E31B1B"/>

