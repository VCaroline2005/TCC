  </defs>

  <path filter="url(#shadow)" d="M491 56c87 37 144 123 135 212-9 90-74 165-146 219-73 54-154 85-227 62-73-23-140-99-158-188-18-90 14-193 87-255 73-62 222-87 309-50z" fill="url(#blob)"/>

  <!-- dotted accents -->
  <g opacity="0.18">
    <circle cx="126" cy="176" r="3" fill="#E31B1B"/>
    <circle cx="146" cy="156" r="3" fill="#E31B1B"/>
    <circle cx="166" cy="176" r="3" fill="#E31B1B"/>
    <circle cx="186" cy="156" r="3" fill="#E31B1B"/>
    <circle cx="206" cy="176" r="3" fill="#E31B1B"/>
    <circle cx="226" cy="156" r="3" fill="#E31B1B"/>
  </g>

  <!-- books -->
  <g filter="url(#shadow)">
    <rect x="314" y="302" width="270" height="56" rx="14" fill="url(#book)"/>
    <rect x="330" y="318" width="238" height="8" rx="4" fill="#E31B1B" opacity="0.38"/>
    <rect x="314" y="234" width="270" height="56" rx="14" fill="url(#book)"/>
    <rect x="330" y="250" width="238" height="8" rx="4" fill="#E31B1B" opacity="0.38"/>
    <rect x="314" y="166" width="270" height="56" rx="14" fill="url(#book)"/>
    <rect x="330" y="182" width="238" height="8" rx="4" fill="#E31B1B" opacity="0.38"/>
