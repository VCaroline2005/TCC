<svg width="760" height="520" viewBox="0 0 760 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustração de estudos em enfermagem">
  <defs>
    <linearGradient id="blob" x1="110" y1="60" x2="640" y2="480" gradientUnits="userSpaceOnUse">
